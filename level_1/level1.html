<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Level 1 — The Mosslands</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --scene-bg-image: none;
      --scene-img-position: center center;
      --scene-img-size: cover;
      --scene-edge-vignette: radial-gradient(
        ellipse 80% 80% at 50% 50%,
        rgba(0, 0, 0, 0) 45%,
        rgba(70, 50, 30, 0.4) 100%
      );
      --scene-photo-opacity: 0.55;
      --scene-photo-fade-duration: 2s;
    }
    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      background: #e6dfd3;
      color: #2c1e16;
      font-family: "Georgia", "Times New Roman", serif;
    }
    
    #inventory-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(10, 24, 32, 0.85);
      color: rgba(255, 235, 220, 0.9);
      padding: 15px 25px;
      border: 1px solid rgba(255, 235, 220, 0.3);
      display: none;
      z-index: 100;
      font-family: "Museo Slab 500", serif;
    }
    #inventory-panel h3 {
      margin: 0 0 10px 0;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid rgba(255, 235, 220, 0.3);
      padding-bottom: 5px;
    }
    #inventory-list {
      list-style-type: square;
      margin: 0;
      padding: 0 0 0 15px;
    }
    #inventory-list li {
      margin-bottom: 6px;
      font-size: 1rem;
    }

    #sceneBackdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: #e6dfd3;
    }
    .scene-backdrop-photo {
      position: absolute;
      inset: 0;
      background-image: var(--scene-bg-image);
      background-size: var(--scene-img-size);
      background-position: var(--scene-img-position);
      background-repeat: no-repeat;
      opacity: var(--scene-photo-opacity);
      transition: opacity var(--scene-photo-fade-duration, 2s) ease-in-out;
    }
    .scene-backdrop-photo.scene-backdrop-photo--no-transition {
      transition: none;
    }
    .scene-backdrop-overlays {
      position: absolute;
      inset: 0;
      background-image: var(--scene-bg-gradient), var(--scene-edge-vignette);
      background-size: cover, cover;
      background-position: center center, center center;
      background-repeat: no-repeat, no-repeat;
    }
    #storyPanel {
      position: relative;
      z-index: 1;
      max-width: 42rem;
      margin: 4rem auto;
      padding: 3rem 2.5rem;
      background: rgba(230, 223, 211, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(44, 30, 22, 0.15);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    .location-title {
      text-align: center;
      font-weight: bold;
      font-size: 2.2rem;
      margin-bottom: 1.5rem;
      letter-spacing: 2px;
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    }
    .story-text {
      text-align: center;
      white-space: pre-wrap;
      line-height: 1.65;
      font-size: 1.15rem;
      margin-bottom: 2.5rem;
    }
    .story-text .golden-moss {
      color: #b8860b;
      font-style: inherit;
      font-weight: 600;
      text-shadow:
        0 0 6px rgba(255, 230, 140, 0.95),
        0 0 14px rgba(255, 200, 80, 0.85),
        0 0 24px rgba(255, 170, 40, 0.55);
    }
    
    .interactable {
      font-weight: bold;
      text-decoration: underline;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .interactable:hover {
      opacity: 0.7;
    }
    .item-wood { color: #8b5a2b; }
    .item-veggies { color: #4f634c; }
    .item-beaver { color: #8c4631; }
    .item-water { color: #4a7c82; }
    .item-stew { color: #b07d3b; }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    #storyPanel button {
      flex: 0 1 auto;
      width: auto;
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      border: none;
      border-top: 1px solid rgba(44, 30, 22, 0.3);
      border-bottom: 1px solid rgba(44, 30, 22, 0.3);
      background: transparent;
      color: #2c1e16;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    #storyPanel button:hover {
      background: rgba(44, 30, 22, 0.05);
    }
  </style>
</head>
<body>
  <div id="inventory-panel">
    <h3>Inventory</h3>
    <ul id="inventory-list"></ul>
  </div>
  <div id="sceneBackdrop" aria-hidden="true">
    <div class="scene-backdrop-photo"></div>
    <div class="scene-backdrop-overlays"></div>
  </div>
  <div id="storyPanel">
    <div id="adventureBox"></div>
  </div>
  <script src="level1.js"></script>
</body>
</html>
