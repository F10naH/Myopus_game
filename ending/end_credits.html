<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myodyssey — Credits</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #071d1d;
      font-family: "Dancing Script", "Times New Roman", cursive, serif;
    }

    #forestPhoto {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url("../level_0/image.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transform: scale(1.06);
      animation: forestFadeIn 7s ease-in-out forwards;
    }

    #dreamOverlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(
          ellipse at center,
          rgba(255, 214, 160, 0.25) 0%,
          rgba(74, 160, 145, 0.28) 36%,
          rgba(5, 28, 32, 0.9) 100%
        ),
        linear-gradient(
          180deg,
          rgba(25, 165, 170, 0.35),
          rgba(5, 18, 24, 0.92)
        );
      pointer-events: none;
    }

    @keyframes forestFadeIn {
      from {
        opacity: 0;
        transform: scale(1.1);
      }

      to {
        opacity: 0.4;
        transform: scale(1);
      }
    }

    #titleScreen {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .title-frame {
      width: 100vw;
      padding: 4.5rem 2rem;
      border-top: 2px solid rgba(255, 255, 255, 0.72);
      border-bottom: 2px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.035);
      overflow: hidden;
    }

    .game-title {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.08em;
      color: rgba(255, 255, 255, 0.94);
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 200;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      text-shadow:
        0 0 18px rgba(255, 255, 255, 0.38),
        0 0 42px rgba(180, 255, 230, 0.24);
    }

    .game-title span {
      display: inline-block;
      opacity: 0;
      filter: blur(7px);
      transform:
        translate(var(--x), var(--y))
        rotate(var(--r))
        scale(0.85);
      animation: assembleTitle 4.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: var(--delay);
    }

    @keyframes assembleTitle {
      0% {
        opacity: 0;
        filter: blur(8px);
        transform:
          translate(var(--x), var(--y))
          rotate(var(--r))
          scale(0.82);
      }

      45% {
        opacity: 0.65;
      }

      75% {
        filter: blur(2px);
      }

      100% {
        opacity: 1;
        filter: blur(0);
        transform:
          translate(0, 0)
          rotate(0deg)
          scale(1);
      }
    }

    .chapter {
      margin-top: 1.7rem;
      color: rgba(255, 255, 255, 0.78);
      font-size: clamp(1rem, 2vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 2.5s ease forwards;
      animation-delay: 4s;
    }

    .tap-text {
      margin-top: 3.5rem;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(1rem, 2vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
      animation: tapFade 2s ease-in-out infinite;
      animation-delay: 5.8s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
        filter: blur(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes tapFade {
      0% {
        opacity: 0.25;
      }

      50% {
        opacity: 0.9;
      }

      100% {
        opacity: 0.25;
      }
    }
  </style>
</head>

<body>
  <div id="forestPhoto"></div>
  <div id="dreamOverlay"></div>

  <main id="titleScreen">
    <section class="title-frame">
      <h1 class="game-title" aria-label="Myodyssey">
        <span style="--x: -260px; --y: -80px; --r: -18deg; --delay: 0.1s;">M</span>
        <span style="--x: -180px; --y: 90px; --r: 14deg; --delay: 0.25s;">Y</span>
        <span style="--x: -120px; --y: -120px; --r: 22deg; --delay: 0.4s;">O</span>
        <span style="--x: -70px; --y: 110px; --r: -12deg; --delay: 0.55s;">D</span>
        <span style="--x: 25px; --y: -150px; --r: 16deg; --delay: 0.7s;">Y</span>
        <span style="--x: 90px; --y: 120px; --r: -20deg; --delay: 0.85s;">S</span>
        <span style="--x: 150px; --y: -95px; --r: 12deg; --delay: 1s;">S</span>
        <span style="--x: 220px; --y: 80px; --r: -16deg; --delay: 1.15s;">E</span>
        <span style="--x: 280px; --y: -70px; --r: 18deg; --delay: 1.3s;">Y</span>
      </h1>

      <p class="chapter">Fin</p>
      <p class="tap-text">Fiona Han, Hunaida Elhassan, Violet Crow, Mayowa Adesina, Addis Adam</p>
    </section>
  </main>
</body>
</html>
