<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myodyssey — Chapter I</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #0a1820;
      font-family: "Museo Slab 500", serif;
    }

    /* --- Start Scene CSS --- */
    .world {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 165vh;
      transform: translateY(-65vh);
      animation: cameraPanUp 3s cubic-bezier(0.55, 0.05, 0.25, 1) forwards;
    }

    @keyframes cameraPanUp {
      0%   { transform: translateY(-65vh); }
      100% { transform: translateY(0); }
    }

    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        #f4c2a0 0%, #ecaa9a 9%, #d68a93 19%, #b27193 30%,
        #875d8a 42%, #5a4d7a 55%, #324a65 70%, #1c3a4e 84%,
        #0e2734 95%, #081e28 100%
      );
    }

    .haze {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 40% at 50% 35%,
        rgba(255, 200, 170, 0.25) 0%,
        rgba(255, 200, 170, 0.05) 40%,
        transparent 70%
      );
      pointer-events: none;
    }

    .forest {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 65vh;
      display: block;
    }

    .mist {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30vh;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(50, 30, 60, 0.18) 60%,
        rgba(20, 10, 30, 0.4) 100%
      );
      pointer-events: none;
    }

    #titleScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      z-index: 2;
      pointer-events: none;
      animation: enableInteraction 0.01s 5.2s forwards;
    }

    @keyframes enableInteraction {
      to { pointer-events: auto; }
    }

    .title-frame {
      width: 100vw;
      padding: 4.5rem 2rem;
      border-top: 1.5px solid rgba(255, 235, 220, 0.55);
      border-bottom: 1.5px solid rgba(255, 235, 220, 0.55);
      background: rgba(255, 240, 230, 0.04);
      overflow: hidden;
      opacity: 0;
      animation: frameFadeIn 1.2s ease-out 0.85s forwards;
    }

    @keyframes frameFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .game-title {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.06em;
      color: rgba(255, 245, 235, 0.96);
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 200;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      text-shadow:
        0 0 22px rgba(255, 210, 190, 0.45),
        0 0 50px rgba(220, 150, 180, 0.28);
    }

    .game-title span {
      display: inline-block;
      opacity: 0;
      filter: blur(7px);
      transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0.85);
      animation: assembleTitle 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: calc(var(--delay) + 1s);
    }

    @keyframes assembleTitle {
      0% {
        opacity: 0;
        filter: blur(8px);
        transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0.82);
      }
      45%  { opacity: 0.65; }
      75%  { filter: blur(2px); }
      100% {
        opacity: 1;
        filter: blur(0);
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
    }

    .chapter {
      margin-top: 1.7rem;
      color: rgba(255, 235, 220, 0.82);
      font-size: clamp(1rem, 2vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1.6s ease 3.6s forwards;
    }

    .tap-text {
      margin-top: 3.5rem;
      color: rgba(255, 235, 220, 0.7);
      font-size: clamp(1rem, 2vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
      animation: tapFade 2.4s ease-in-out 4.6s infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes tapFade {
      0%   { opacity: 0.25; }
      50%  { opacity: 0.9; }
      100% { opacity: 0.25; }
    }

    #titleScreen:hover .tap-text {
      color: rgba(255, 200, 215, 0.95);
    }

    /* --- Slideshow CSS --- */
    #slideshow-container {
      position: absolute;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      display: none;
      justify-content: center;
      align-items: center;
      background-color: black;
      z-index: 5;
    }

    #slide-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }

    #slide-img.slide-img--fade-in {
      opacity: 0;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 4rem;
      color: white;
      background-color: rgba(0, 0, 0, 0.3);
      padding: 10px 20px;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      transition: background-color 0.2s;
    }

    .nav-arrow:hover {
      background-color: rgba(0, 0, 0, 0.7);
    }

    #left-arrow { left: 0; }
    #right-arrow { right: 0; }
  </style>
</head>
<body>

  <audio id="bg-music" src="../music/Home Sweet Home.mp3" loop></audio>

  <div class="world" id="start-world">
    <div class="sky"></div>
    <div class="haze"></div>
    <svg class="forest" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
      <g id="back-trees"  opacity="0.5"></g>
      <g id="mid-trees"   opacity="0.85"></g>
      <g id="front-trees"></g>
    </svg>
    <div class="mist"></div>
  </div>

  <main id="titleScreen" onclick="startSlideshow()">
    <section class="title-frame">
      <h1 class="game-title" aria-label="Myodyssey">
        <span style="--x: -260px; --y: -80px;  --r: -18deg; --delay: 0.10s;">M</span>
        <span style="--x: -180px; --y:  90px;  --r:  14deg; --delay: 0.25s;">Y</span>
        <span style="--x: -120px; --y: -120px; --r:  22deg; --delay: 0.40s;">O</span>
        <span style="--x:  -70px; --y:  110px; --r: -12deg; --delay: 0.55s;">D</span>
        <span style="--x:   25px; --y: -150px; --r:  16deg; --delay: 0.70s;">Y</span>
        <span style="--x:   90px; --y:  120px; --r: -20deg; --delay: 0.85s;">S</span>
        <span style="--x:  150px; --y:  -95px; --r:  12deg; --delay: 1.00s;">S</span>
        <span style="--x:  220px; --y:   80px; --r: -16deg; --delay: 1.15s;">E</span>
        <span style="--x:  280px; --y:  -70px; --r:  18deg; --delay: 1.30s;">Y</span>
      </h1>
      <p class="chapter">Chapter I</p>
      <p class="tap-text">Tap to begin</p>
    </section>
  </main>

  <div id="slideshow-container">
    <img id="slide-img" src="" alt="Story Slide">
    <div id="left-arrow" class="nav-arrow">&lt;</div>
    <div id="right-arrow" class="nav-arrow">&gt;</div>
  </div>

  <script src="level0.js?v=opening-slide-4-5-swap"></script>
</body>
</html>
