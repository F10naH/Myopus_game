<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myodyssey — Chapter I</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #0a1820;
      font-family: "Museo Slab 500", serif;
    }

    /* The "world" is taller than the viewport so the camera can pan up through it */
    .world {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 165vh;
      transform: translateY(-65vh); /* start showing the bottom (forest) */
      animation: cameraPanUp 3s cubic-bezier(0.55, 0.05, 0.25, 1) forwards;
    }

    @keyframes cameraPanUp {
      0%   { transform: translateY(-65vh); }
      100% { transform: translateY(0); }
    }

    /* Monument-Valley-style sky gradient */
    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        #f4c2a0 0%,
        #ecaa9a 9%,
        #d68a93 19%,
        #b27193 30%,
        #875d8a 42%,
        #5a4d7a 55%,
        #324a65 70%,
        #1c3a4e 84%,
        #0e2734 95%,
        #081e28 100%
      );
    }

    /* Warm glow behind where the title will be */
    .haze {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 40% at 50% 35%,
        rgba(255, 200, 170, 0.25) 0%,
        rgba(255, 200, 170, 0.05) 40%,
        transparent 70%
      );
      pointer-events: none;
    }

    /* Geometric forest at the bottom of the world */
    .forest {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 65vh;
      display: block;
    }

    /* Soft mist hugging the base of the forest */
    .mist {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30vh;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(50, 30, 60, 0.18) 60%,
        rgba(20, 10, 30, 0.4) 100%
      );
      pointer-events: none;
    }

    /* Title positioned in the upper portion of the world (revealed by the pan) */
    #titleScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      z-index: 2;
      pointer-events: none; /* unlocked after camera settles */
      animation: enableInteraction 0.01s 5.2s forwards;
    }

    @keyframes enableInteraction {
      to { pointer-events: auto; }
    }

    .title-frame {
      width: 100vw;
      padding: 4.5rem 2rem;
      border-top: 1.5px solid rgba(255, 235, 220, 0.55);
      border-bottom: 1.5px solid rgba(255, 235, 220, 0.55);
      background: rgba(255, 240, 230, 0.04);
      overflow: hidden;
      opacity: 0;
      animation: frameFadeIn 1.2s ease-out 0.85s forwards;
    }

    @keyframes frameFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .game-title {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.06em;
      color: rgba(255, 245, 235, 0.96);
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 200;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      text-shadow:
        0 0 22px rgba(255, 210, 190, 0.45),
        0 0 50px rgba(220, 150, 180, 0.28);
    }

    .game-title span {
      display: inline-block;
      opacity: 0;
      filter: blur(7px);
      transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0.85);
      animation: assembleTitle 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      /* Start title motion soon after pan begins so it feels connected, not “dead air” */
      animation-delay: calc(var(--delay) + 1s);
    }

    @keyframes assembleTitle {
      0% {
        opacity: 0;
        filter: blur(8px);
        transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0.82);
      }
      45%  { opacity: 0.65; }
      75%  { filter: blur(2px); }
      100% {
        opacity: 1;
        filter: blur(0);
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
    }

    .chapter {
      margin-top: 1.7rem;
      color: rgba(255, 235, 220, 0.82);
      font-size: clamp(1rem, 2vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1.6s ease 3.6s forwards;
    }

    .tap-text {
      margin-top: 3.5rem;
      color: rgba(255, 235, 220, 0.7);
      font-size: clamp(1rem, 2vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
      animation: tapFade 2.4s ease-in-out 4.6s infinite;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes tapFade {
      0%   { opacity: 0.25; }
      50%  { opacity: 0.9; }
      100% { opacity: 0.25; }
    }

    #titleScreen:hover .tap-text {
      color: rgba(255, 200, 215, 0.95);
    }
  </style>
</head>

<body>
  <div class="world">
    <div class="sky"></div>
    <div class="haze"></div>

    <!-- Forest: three layered groups of pine-silhouette trees (generated by JS) -->
    <svg class="forest" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
      <g id="back-trees"  opacity="0.5"></g>
      <g id="mid-trees"   opacity="0.85"></g>
      <g id="front-trees"></g>
    </svg>

    <div class="mist"></div>

    <main id="titleScreen" onclick="startGame()">
      <section class="title-frame">
        <h1 class="game-title" aria-label="Myodyssey">
          <span style="--x: -260px; --y: -80px;  --r: -18deg; --delay: 0.10s;">M</span>
          <span style="--x: -180px; --y:  90px;  --r:  14deg; --delay: 0.25s;">Y</span>
          <span style="--x: -120px; --y: -120px; --r:  22deg; --delay: 0.40s;">O</span>
          <span style="--x:  -70px; --y:  110px; --r: -12deg; --delay: 0.55s;">D</span>
          <span style="--x:   25px; --y: -150px; --r:  16deg; --delay: 0.70s;">Y</span>
          <span style="--x:   90px; --y:  120px; --r: -20deg; --delay: 0.85s;">S</span>
          <span style="--x:  150px; --y:  -95px; --r:  12deg; --delay: 1.00s;">S</span>
          <span style="--x:  220px; --y:   80px; --r: -16deg; --delay: 1.15s;">E</span>
          <span style="--x:  280px; --y:  -70px; --r:  18deg; --delay: 1.30s;">Y</span>
        </h1>

        <p class="chapter">Chapter I</p>
        <p class="tap-text">Tap to begin</p>
      </section>
    </main>
  </div>

  <script>
    // ── Pine-tree silhouette generator ────────────────────────────────────────
    (function () {
      function mkRng(seed) {
        let s = (seed ^ 0xdeadbeef) >>> 0;
        return () => { s = (Math.imul(s, 0x9e3779b9) + 0x6b3a9d4f) >>> 0; return s / 0x100000000; };
      }

      // Returns SVG polygon points string for a jagged pine silhouette.
      // lx/rx = left/right base x, apx/apy = apex xy, baseY = 600, steps = tier count.
      // Odd steps → branch tip extends outward; even steps → notch pulls inward.
      function treePts(lx, apx, apy, rx, baseY, steps, rng) {
        const h  = baseY - apy;
        const hw = (rx - lx) / 2;
        const p  = [`${lx},${baseY}`];

        for (let i = 1; i < steps; i++) {
          const t  = i / steps;
          const y  = baseY - t * h;
          const xs = lx + t * (apx - lx);
          const w  = hw * (1 - t);
          const dx = i % 2 === 1
            ? -w * (0.09 + rng() * 0.09)   // branch extends outward (left)
            :  w * (0.04 + rng() * 0.05);  // notch pulls inward (right)
          p.push(`${(xs + dx).toFixed(1)},${y.toFixed(1)}`);
        }

        p.push(`${apx},${apy}`);

        for (let i = steps - 1; i >= 1; i--) {
          const t  = i / steps;
          const y  = baseY - t * h;
          const xs = rx - t * (rx - apx);
          const w  = hw * (1 - t);
          const dx = i % 2 === 1
            ?  w * (0.09 + rng() * 0.09)   // branch extends outward (right)
            : -w * (0.04 + rng() * 0.05);  // notch pulls inward (left)
          p.push(`${(xs + dx).toFixed(1)},${y.toFixed(1)}`);
        }

        p.push(`${rx},${baseY}`);
        return p.join(' ');
      }

      function poly(pts, fill) {
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        el.setAttribute('points', pts);
        el.setAttribute('fill', fill);
        return el;
      }

      const rng = mkRng(7);

      const backData = [
        [40,100,360,160,"#4a6e52"],[170,215,400,260,"#3d6045"],[270,325,310,380,"#4a6e52"],
        [390,445,380,500,"#3d6045"],[510,575,290,640,"#4a6e52"],[650,695,400,740,"#3d6045"],
        [770,835,320,900,"#4a6e52"],[910,965,360,1020,"#3d6045"],[1040,1095,290,1150,"#4a6e52"],
        [1170,1225,380,1280,"#3d6045"],[1295,1350,330,1405,"#4a6e52"],[1415,1470,400,1525,"#3d6045"],
        [1535,1580,360,1625,"#4a6e52"],
      ];
      const backG = document.getElementById('back-trees');
      backData.forEach(([lx,apx,apy,rx,fill]) =>
        backG.appendChild(poly(treePts(lx,apx,apy,rx,600,6,rng), fill)));

      const midData = [
        [-20,50,260,120,"#1e3d28"],[110,180,180,250,"#1a3d30"],[230,290,310,350,"#1e3d28"],
        [330,410,160,490,"#163525"],[470,530,300,590,"#1e3d28"],[570,650,140,730,"#1a3d30"],
        [710,780,250,850,"#1e3d28"],[830,900,180,970,"#163525"],[950,1020,310,1090,"#1e3d28"],
        [1070,1150,170,1230,"#1a3d30"],[1210,1280,260,1350,"#1e3d28"],[1330,1410,200,1490,"#163525"],
        [1470,1530,290,1590,"#1e3d28"],[1570,1640,210,1710,"#1a3d30"],
      ];
      const midG = document.getElementById('mid-trees');
      midData.forEach(([lx,apx,apy,rx,fill]) =>
        midG.appendChild(poly(treePts(lx,apx,apy,rx,600,7,rng), fill)));

      const frontData = [
        [-40,30,170,100,"#0d2218"],[70,145,110,220,"#162e1c"],[200,260,240,320,"#0d2218"],
        [300,380,160,460,"#0f2015"],[440,520,90,600,"#0d2218"],[580,645,230,710,"#162e1c"],
        [690,770,130,850,"#0d2218"],[830,900,200,970,"#0f2015"],[950,1030,110,1110,"#0d2218"],
        [1090,1170,190,1250,"#162e1c"],[1230,1300,250,1370,"#0d2218"],[1350,1430,130,1510,"#0f2015"],
        [1490,1560,190,1630,"#0d2218"],[1610,1685,170,1760,"#162e1c"],
      ];
      const frontG = document.getElementById('front-trees');
      frontData.forEach(([lx,apx,apy,rx,fill]) =>
        frontG.appendChild(poly(treePts(lx,apx,apy,rx,600,9,rng), fill)));
    })();

    function startGame() {
      window.location.href = "../level_1/level1.html";
    }
  </script>
</body>
</html>
