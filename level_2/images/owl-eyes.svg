<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 90" role="img" aria-label="Owl eyes">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="eyeGlow" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#fff8cf"/>
      <stop offset="0.48" stop-color="#d7f0d2"/>
      <stop offset="1" stop-color="#7fa86c"/>
    </radialGradient>
  </defs>
  <g filter="url(#glow)">
    <ellipse cx="74" cy="45" rx="18" ry="25" fill="rgba(0,0,0,0.72)"/>
    <ellipse cx="146" cy="45" rx="18" ry="25" fill="rgba(0,0,0,0.72)"/>
    <circle cx="74" cy="45" r="9" fill="url(#eyeGlow)"/>
    <circle cx="146" cy="45" r="9" fill="url(#eyeGlow)"/>
    <circle cx="71" cy="41" r="3" fill="#fffef2"/>
    <circle cx="143" cy="41" r="3" fill="#fffef2"/>
  </g>
</svg>
