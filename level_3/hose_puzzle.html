<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Snake's Alignment - 5x5 System</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        background: #121a16;
        color: #e8ebe4;
        overflow: hidden;
        user-select: none;
      }
      #puzzle-container {
        position: relative;
        text-align: center;
        background: rgba(20, 30, 24, 0.85);
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #5a7a66;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }
      h2 {
        margin-top: 0;
        color: #f4e8c8;
        font-size: 22px;
      }
      p {
        font-size: 14px;
        margin-bottom: 20px;
        color: #adbcaf;
      }

      /* Scaled to fit 5 columns of 100px + gaps cleanly */
      #grid {
        display: grid;
        grid-template-columns: repeat(5, 100px);
        grid-template-rows: repeat(5, 100px);
        gap: 8px;
        margin: 0 auto;
        width: 532px;
      }
      .tile {
        width: 100px;
        height: 100px;
        background: #233428;
        border: 2px solid #3d5443;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        transition:
          background 0.2s,
          transform 0.15s ease-out;
      }
      .tile:hover:not(.locked) {
        background: #2d4233;
      }

      .tile.locked {
        background: #19251d;
        border-color: #27382d;
        cursor: not-allowed;
      }
      .tile.locked::after {
        content: "🔒";
        position: absolute;
        top: 5px;
        left: 5px;
        font-size: 10px;
        opacity: 0.4;
      }

      .hose {
        position: absolute;
        background: #e1b12c;
        box-shadow: inset 0 0 8px #b38600;
        z-index: 2;
      }

      /* I-Piece (Straight Line) */
      .pipe-I {
        width: 100%;
        height: 20px;
      }

      /* L-Piece (Elbow Joint) */
      .pipe-L-1 {
        width: 60%;
        height: 20px;
        left: 0;
        top: 40px;
      }
      .pipe-L-2 {
        width: 20px;
        height: 60%;
        left: 40px;
        top: 40px;
      }

      /* T-Piece (3-Way Junction) */
      .pipe-T-main {
        width: 100%;
        height: 20px;
        left: 0;
        top: 40px;
      }
      .pipe-T-branch {
        width: 20px;
        height: 40%;
        left: 40px;
        top: 0;
      }

      #win-message {
        position: absolute;
        inset: 0;
        border-radius: 12px;
        background: rgba(18, 26, 22, 0.96);
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        display: none;
        padding: 1.5rem;
      }
      #win-message.is-visible {
        display: flex;
      }
      button {
        padding: 12px 24px;
        font-size: 16px;
        background: #5f4428;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 15px;
      }
      button:hover {
        background: #735332;
      }
    </style>
  </head>
  <body>
    <div id="puzzle-container">
      <h2>Align the Orchard Pipeline</h2>
      <p>
        Click the tiles to route the water flow. The top-left entry and
        bottom-right exit are fixed. Connect them to stabilize the system!
      </p>

      <div id="grid"></div>

      <div id="win-message">
        <h2 style="font-size: 28px">Water Circuit Sealed!</h2>
        <p>
          The system pressure stabilizes. You can now get water from the hose.
        </p>
        <button type="button" id="hoseWinContinue">Continue</button>
      </div>
    </div>

    <script>
      // Scrambled initial grid array.
      const tilesData = [
        /* Row 0 */
        { type: "L", angle: 0, locked: true }, // 0 - Fixed Entry
        { type: "L", angle: 1, locked: false }, // 1  (Target: 3)
        { type: "T", angle: 0, locked: false }, // 2  (Target: 2)
        { type: "I", angle: 1, locked: false }, // 3  (Target: 0 or 2)
        { type: "L", angle: 2, locked: false }, // 4  (Target: 0)
        /* Row 1 */
        { type: "I", angle: 0, locked: false }, // 5  (Target: 1 or 3)
        { type: "I", angle: 0, locked: false }, // 6  (Target: 1 or 3)
        { type: "L", angle: 0, locked: false }, // 7  (Target: 2)
        { type: "T", angle: 3, locked: false }, // 8  (Target: 2)
        { type: "T", angle: 1, locked: false }, // 9  (Target: 3)
        /* Row 2 */
        { type: "T", angle: 3, locked: false }, // 10 (Target: 1)
        { type: "L", angle: 3, locked: false }, // 11 (Target: 1)
        { type: "L", angle: 1, locked: false }, // 12 (Target: 3)
        { type: "L", angle: 3, locked: false }, // 13 (Target: 1)
        { type: "I", angle: 0, locked: false }, // 14 (Target: 1 or 3)
        /* Row 3 */
        { type: "I", angle: 0, locked: false }, // 15 (Target: 1 or 3)
        { type: "L", angle: 1, locked: false }, // 16 (Target: 3)
        { type: "T", angle: 2, locked: false }, // 17 (Target: 0)
        { type: "L", angle: 2, locked: false }, // 18 (Target: 0)
        { type: "I", angle: 0, locked: false }, // 19 (Target: 1 or 3)
        /* Row 4 */
        { type: "L", angle: 0, locked: false }, // 20 (Target: 2)
        { type: "T", angle: 2, locked: false }, // 21 (Target: 0)
        { type: "I", angle: 1, locked: false }, // 22 (Target: 0 or 2)
        { type: "T", angle: 2, locked: false }, // 23 (Target: 0)
        { type: "T", angle: 3, locked: true }, // 24 - Fixed Exit
      ];

      let winShown = false;

      /*
      //handles path connection logic based on tile type and angle. Returns array of connected directions:
      function getConnections(type, angle) {
        let base;
        if (type === "I")
          base = [1, 3]; // East & West
        else if (type === "L")
          base = [1, 2]; // East & South
        else base = [0, 1, 3]; // North, East, West (T-Piece default)
        return base.map((d) => (d + angle) % 4);
      }*/

      // Dynamic pathfinder matrix modified for 5-wide grids. Verifies a valid path is listed.
      /*function isPathConnected() {
        const visited = new Set([0]);
        const queue = [0];

        while (queue.length) {
          const idx = queue.shift();
          if (idx === 24) return true;

          const conns = getConnections(
            tilesData[idx].type,
            tilesData[idx].angle,
          );
          const row = Math.floor(idx / 5);
          const col = idx % 5;

          const neighbors = [
            [row > 0 ? idx - 5 : -1, 0, 2], // North
            [col < 4 ? idx + 1 : -1, 1, 3], // East
            [row < 4 ? idx + 5 : -1, 2, 0], // South
            [col > 0 ? idx - 1 : -1, 3, 1], // West
          ];

          for (const [ni, dir, opposite] of neighbors) {
            if (ni < 0 || visited.has(ni)) continue;
            if (!conns.includes(dir)) continue;

            const nconns = getConnections(
              tilesData[ni].type,
              tilesData[ni].angle,
            );
            if (!nconns.includes(opposite)) continue;

            visited.add(ni);
            queue.push(ni);
          }
        }
        return false;
      }*/

      // Target solution mapping. Manually traced and fully verified.
      function isSketchSolution() {
        return tilesData.every((tile, idx) => {
          if (idx === 0) return tile.angle === 0;
          if (idx === 24) return tile.angle === 3;
          switch (idx) {
            /* Row 0 */
            case 1:
              return tile.angle === 3;
            case 2:
              return tile.angle === 2;
            case 3:
              return tile.angle === 0 || tile.angle === 2;
            case 4:
              return tile.angle === 0;
            /* Row 1 */
            case 5:
              return tile.angle === 1 || tile.angle === 3;
            case 6:
              return tile.angle === 1 || tile.angle === 3;
            case 7:
              return tile.angle === 2;
            case 8:
              return tile.angle === 2;
            case 9:
              return tile.angle === 3;
            /* Row 2 */
            case 10:
              return tile.angle === 1;
            case 11:
              return tile.angle === 1;
            case 12:
              return tile.angle === 3;
            case 13:
              return tile.angle === 1;
            case 14:
              return tile.angle === 1 || tile.angle === 3;
            /* Row 3 */
            case 15:
              return tile.angle === 1 || tile.angle === 3;
            case 16:
              return tile.angle === 3;
            case 17:
              return tile.angle === 0;
            case 18:
              return tile.angle === 0;
            case 19:
              return tile.angle === 1 || tile.angle === 3;
            /* Row 4 */
            case 20:
              return tile.angle === 2;
            case 21:
              return tile.angle === 0;
            case 22:
              return tile.angle === 0 || tile.angle === 2;
            case 23:
              return tile.angle === 0;
          }
        });
      }

      function showWinScreen() {
        if (winShown) return;
        winShown = true;
        document.getElementById("win-message").classList.add("is-visible");
      }

      function checkWin() {
        if (winShown) return;
        if (isSketchSolution()) {
          showWinScreen();
        }
      }

      const gridContainer = document.getElementById("grid");
      const visualAngles = new Array(tilesData.length).fill(0);

      function createGrid() {
        tilesData.forEach((tile, index) => {
          const tileDiv = document.createElement("div");
          tileDiv.className = "tile" + (tile.locked ? " locked" : "");

          // Seed visual tracker array with initial angle settings
          visualAngles[index] = tile.angle;
          tileDiv.style.transform = `rotate(${tile.angle * 90}deg)`;

          if (tile.type === "I") {
            const p = document.createElement("div");
            p.className = "hose pipe-I";
            tileDiv.appendChild(p);
          } else if (tile.type === "L") {
            const p1 = document.createElement("div");
            p1.className = "hose pipe-L-1";
            const p2 = document.createElement("div");
            p2.className = "hose pipe-L-2";
            tileDiv.appendChild(p1);
            tileDiv.appendChild(p2);
          } else if (tile.type === "T") {
            const p1 = document.createElement("div");
            p1.className = "hose pipe-T-main";
            const p2 = document.createElement("div");
            p2.className = "hose pipe-T-branch";
            tileDiv.appendChild(p1);
            tileDiv.appendChild(p2);
          }

          if (!tile.locked) {
            tileDiv.addEventListener("click", () => {
              if (winShown) return;

              tile.angle = (tile.angle + 1) % 4;

              // Forward animation calculation rule tracking
              visualAngles[index]++;
              tileDiv.style.transform = `rotate(${visualAngles[index] * 90}deg)`;

              setTimeout(checkWin, 20);
            });
          }

          gridContainer.appendChild(tileDiv);
        });
      }

      document.getElementById("hoseWinContinue").addEventListener(
        "click",
        () => {
          window.parent.postMessage("HOSE_COMPLETE", "*");
        },
        { once: true },
      );

      createGrid();
      checkWin();
    </script>
  </body>
</html>
