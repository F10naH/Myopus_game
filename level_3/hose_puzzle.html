<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Snake's Alignment - Fixed</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        background: #121a16;
        color: #e8ebe4;
        overflow: hidden;
        user-select: none;
      }
      #puzzle-container {
        position: relative;
        text-align: center;
        background: rgba(20, 30, 24, 0.85);
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #5a7a66;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }
      h2 {
        margin-top: 0;
        color: #f4e8c8;
        font-size: 22px;
      }
      p {
        font-size: 14px;
        margin-bottom: 20px;
        color: #adbcaf;
      }

      #grid {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 8px;
        margin: 0 auto;
        width: 316px;
      }
      .tile {
        width: 100px;
        height: 100px;
        background: #233428;
        border: 2px solid #3d5443;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        transition: background 0.2s;
      }
      .tile:hover:not(.locked) {
        background: #2d4233;
      }

      .tile.locked {
        background: #19251d;
        border-color: #27382d;
        cursor: not-allowed;
      }
      .tile.locked::after {
        content: "🔒";
        position: absolute;
        top: 5px;
        left: 5px;
        font-size: 10px;
        opacity: 0.4;
      }

      .hose {
        position: absolute;
        background: #e1b12c;
        box-shadow: inset 0 0 8px #b38600;
        z-index: 2;
      }

      /* I-Piece (Straight Line) */
      .pipe-I {
        width: 100%;
        height: 20px;
      }

      /* L-Piece (Elbow Joint) */
      .pipe-L-1 {
        width: 60%;
        height: 20px;
        left: 0;
        top: 40px;
      }
      .pipe-L-2 {
        width: 20px;
        height: 60%;
        left: 40px;
        top: 40px;
      }

      /* T-Piece (3-Way Junction) */
      .pipe-T-main {
        width: 100%;
        height: 20px;
        left: 0;
        top: 40px;
      }
      .pipe-T-branch {
        width: 20px;
        height: 40%;
        left: 40px;
        top: 0;
      } /* Branch points up at angle 0 */

      #win-message {
        position: absolute;
        inset: 0;
        border-radius: 12px;
        background: rgba(18, 26, 22, 0.96);
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        display: none;
        padding: 1.5rem;
      }
      #win-message.is-visible {
        display: flex;
      }
      button {
        padding: 12px 24px;
        font-size: 16px;
        background: #5f4428;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 15px;
      }
      button:hover {
        background: #735332;
      }
    </style>
  </head>
  <body>
    <div id="puzzle-container">
      <h2>Align the Orchard Pipeline</h2>
      <p>
        Click the tiles to route the water flow. The entry and exit joints are
        locked solid.
      </p>

      <div id="grid"></div>

      <div id="win-message">
        <h2 style="font-size: 28px">Water Circuit Sealed!</h2>
        <p>
          The garden hose feeds directly into the apple container. Fermentation
          can begin.
        </p>
        <p style="font-size: 14px; color: #adbcaf">
          Click <strong>Continue</strong> when you are ready to return to the
          story.
        </p>
        <button type="button" id="hoseWinContinue">Continue</button>
      </div>
    </div>

    <script>
      // Corrected puzzle arrangement based exactly on your layout design drawing
      // angle representation: 0 = 0°, 1 = 90°, 2 = 180°, 3 = 270°
      const tilesData = [
        { type: "L", angle: 0, locked: true }, // (0,0) Row 0, Col 0: Locked entry (Right/Down)
        { type: "L", angle: 0, locked: false }, // (1,0) Row 0, Col 1: Standard Elbow
        { type: "L", angle: 2, locked: false }, // (2,0) Row 0, Col 2: Standard Elbow
        { type: "T", angle: 0, locked: false }, // (0,1) Row 1, Col 0: T-Junction (3-sides)
        { type: "L", angle: 3, locked: false }, // (1,1) Row 1, Col 1: Standard Elbow
        { type: "I", angle: 0, locked: false }, // (2,1) Row 1, Col 2: Straight Vertical/Horizontal
        { type: "L", angle: 1, locked: false }, // (0,2) Row 2, Col 0: Standard Elbow
        { type: "I", angle: 1, locked: false }, // (1,2) Row 2, Col 1: Straight Horizontal/Vertical
        { type: "T", angle: 3, locked: true }, // (2,2) Row 2, Col 2: Locked exit T-Junction
      ];

      let winShown = false;

      // 0=N, 1=E, 2=S, 3=W — connections at angle 0, then rotated with the tile
      function getConnections(type, angle, clockwise = true) {
        let base;
        if (type === "I") base = [1, 3];
        else if (type === "L") base = [1, 2];
        else base = [0, 1, 3];
        return base.map((d) =>
          clockwise ? (d + angle) % 4 : (d - angle + 4) % 4,
        );
      }

      function pathConnectedWith(clockwise) {
        const visited = new Set([0]);
        const queue = [0];

        while (queue.length) {
          const idx = queue.shift();
          if (idx === 8) return true;

          const conns = getConnections(
            tilesData[idx].type,
            tilesData[idx].angle,
            clockwise,
          );
          const row = Math.floor(idx / 3);
          const col = idx % 3;
          const neighbors = [
            [row > 0 ? idx - 3 : -1, 0, 2],
            [col < 2 ? idx + 1 : -1, 1, 3],
            [row < 2 ? idx + 3 : -1, 2, 0],
            [col > 0 ? idx - 1 : -1, 3, 1],
          ];

          for (const [ni, dir, opposite] of neighbors) {
            if (ni < 0 || visited.has(ni)) continue;
            if (!conns.includes(dir)) continue;
            const nconns = getConnections(
              tilesData[ni].type,
              tilesData[ni].angle,
              clockwise,
            );
            if (!nconns.includes(opposite)) continue;
            visited.add(ni);
            queue.push(ni);
          }
        }
        return false;
      }

      function isPathConnected() {
        return pathConnectedWith(true) || pathConnectedWith(false);
      }

      /** Matches the layout sketch / yellow-loop solution (four rotation variants). */
      function isSketchSolution() {
        return tilesData.every((tile, idx) => {
          if (idx === 0) return tile.angle === 0;
          if (idx === 8) return tile.angle === 3;
          switch (idx) {
            case 1:
              return tile.angle === 2;
            case 2:
              return tile.angle === 1;
            case 3:
              return tile.angle === 1;
            case 4:
              return tile.angle === 1;
            case 5:
              return tile.angle === 1 || tile.angle === 3;
            case 6:
              return tile.angle === 0;
            case 7:
              return tile.angle === 0 || tile.angle === 2;
            default:
              return false;
          }
        });
      }

      function showWinScreen() {
        if (winShown) return;
        winShown = true;
        document.getElementById("win-message").classList.add("is-visible");
      }

      function checkWin() {
        if (winShown) return;
        if (isPathConnected() || isSketchSolution()) showWinScreen();
      }
      const gridContainer = document.getElementById("grid");

      function createGrid() {
        tilesData.forEach((tile, index) => {
          const tileDiv = document.createElement("div");
          tileDiv.className = "tile" + (tile.locked ? " locked" : "");
          tileDiv.style.transform = `rotate(${tile.angle * 90}deg)`;

          if (tile.type === "I") {
            const p = document.createElement("div");
            p.className = "hose pipe-I";
            tileDiv.appendChild(p);
          } else if (tile.type === "L") {
            const p1 = document.createElement("div");
            p1.className = "hose pipe-L-1";
            const p2 = document.createElement("div");
            p2.className = "hose pipe-L-2";
            tileDiv.appendChild(p1);
            tileDiv.appendChild(p2);
          } else if (tile.type === "T") {
            // Constructs a T-junction shape
            const p1 = document.createElement("div");
            p1.className = "hose pipe-T-main";
            const p2 = document.createElement("div");
            p2.className = "hose pipe-T-branch";
            tileDiv.appendChild(p1);
            tileDiv.appendChild(p2);
          }

          if (!tile.locked) {
            tileDiv.addEventListener("click", () => {
              if (winShown) return;
              // Win may already be satisfied before this click rotates a tile
              checkWin();
              if (winShown) return;

              tile.angle = (tile.angle + 1) % 4;
              tileDiv.style.transform = `rotate(${tile.angle * 90}deg)`;
              checkWin();
            });
          }

          gridContainer.appendChild(tileDiv);
        });
      }

      document.getElementById("hoseWinContinue").addEventListener(
        "click",
        () => {
          window.parent.postMessage("HOSE_COMPLETE", "*");
        },
        { once: true },
      );

      createGrid();
      checkWin();
    </script>
  </body>
</html>
