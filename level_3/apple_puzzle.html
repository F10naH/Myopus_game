<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Waking Sugars</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        background: #14110e;
        color: #e8ebe4;
        overflow: hidden;
        user-select: none;
      }
      #puzzle-container {
        text-align: center;
        background: rgba(26, 20, 16, 0.95);
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #635043;
        box-shadow: 0 4px 25px rgba(0, 0, 0, 0.8);
      }
      h2 {
        margin-top: 0;
        color: #f4e8c8;
        font-size: 22px;
        letter-spacing: 1px;
      }
      p {
        font-size: 13px;
        margin-bottom: 15px;
        color: #ad9e9f;
        max-width: 400px;
        line-height: 1.4;
      }

      canvas {
        display: block;
        margin: 0 auto;
        background: #1f1814;
        border: 2px solid #42342b;
        border-radius: 8px;
        cursor: pointer;
      }
      .meter-label {
        font-size: 12px;
        text-align: left;
        margin: 12px auto 2px;
        width: 400px;
        color: #d0c2b2;
      }
      #progress-bar-container {
        width: 400px;
        height: 18px;
        background: #0f0b09;
        border: 1px solid #42342b;
        border-radius: 9px;
        margin: 0 auto;
        overflow: hidden;
      }
      #progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #a06e46, #bc9270);
        transition: width 0.1s ease-out;
      }
      #win-message {
        position: absolute;
        inset: 0;
        background: rgba(20, 15, 12, 0.98);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        display: none;
      }
      button {
        padding: 12px 24px;
        font-size: 16px;
        background: #5f4428;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 15px;
      }
      button:hover {
        background: #735332;
      }
    </style>
  </head>
  <body>
    <div id="puzzle-container">
      <h2>The Waking Sugars</h2>
      <p>
        Catch <strong>Pure Blue Droplets</strong> inside the ring.
        <span style="color: #cd8455"
          >Avoid Contaminated Brown Droplets entirely!</span
        >
        Uncaught water decays progress.
      </p>
      <canvas id="gameCanvas" width="400" height="420"></canvas>
      <div class="meter-label">Fermentation Progress:</div>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <div id="win-message">
      <h2 style="font-size: 28px; color: #f4e8c8">Aromatic Scent Released!</h2>
      <p>
        The apple has dissolved into a perfectly balanced, dizzyingly sweet
        mush.
      </p>
      <button onclick="completePuzzle()">Return to Orchard</button>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const progressBar = document.getElementById("progress-bar");

      let progress = 0;
      let droplets = [];
      let dropTimer = 0;
      let nextDropTime = 0.66;
      let flashTimer = 0;
      let flashTimerMax = 0;
      let flashColor = "";
      let lastTime = 0;

      // Targets
      const targetY = 340;
      const targetRadius = 24;

      function spawnDroplet() {
        const isContaminated = Math.random() < 0.75;

        droplets.push({
          baseX: 200,
          x: 200,
          y: 50,
          type: isContaminated ? "contam" : "pure",
          speedOffset: Math.random() * 0.8,
          waveSeed: Math.random() * 100,
          passedTarget: false,
        });

        nextDropTime = 0.25 + Math.random() * 0.25;
        dropTimer = 0;
      }

      function updateAndDraw(currentTime) {
        if (!lastTime) lastTime = currentTime;
        const dt = (currentTime - lastTime) / 1000;
        lastTime = currentTime;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (flashTimer > 0) {
          ctx.save();
          ctx.globalAlpha = Math.max(0, flashTimer / flashTimerMax);
          ctx.fillStyle = flashColor;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.restore();
          
          flashTimer -= dt;
        }

        ctx.fillStyle = "#52433a";
        ctx.fillRect(180, 0, 40, 50);
        ctx.fillStyle = "#2b221c";
        ctx.fillRect(190, 45, 20, 10);

        ctx.fillStyle = "#5c3a21";
        ctx.beginPath();
        ctx.arc(200, 360, 50, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(244, 232, 200, 0.5)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(200, targetY, targetRadius, 0, Math.PI * 2);
        ctx.stroke();

        dropTimer += dt;
        if (dropTimer >= nextDropTime) {
          spawnDroplet();
        }

        let dynamicSpeedMultiplier = 1.0 + (progress / 100) * 1.2;

        for (let i = droplets.length - 1; i >= 0; i--) {
          let d = droplets[i];

          d.y += (4 + d.speedOffset) * dynamicSpeedMultiplier * 60 * dt;

          d.x = d.baseX + Math.sin(d.y / 30 + d.waveSeed) * 25;

          if (d.type === "pure") {
            ctx.fillStyle = "#54a0ff"; 
          } else {
            ctx.fillStyle = "#cd8455"; 
          }

          ctx.beginPath();
          ctx.arc(d.x, d.y, 7, 0, Math.PI * 2);
          ctx.fill();

          if (d.y > targetY + targetRadius && !d.passedTarget) {
            d.passedTarget = true;
            if (d.type === "pure") {
              progress = Math.max(0, progress - 5); 
              progressBar.style.width = progress + "%";
              triggerFlash("rgba(235, 94, 85, 0.15)", 0.1);
            }
          }

          if (d.y > canvas.height) {
            droplets.splice(i, 1);
          }
        }

        if (progress < 100) {
          requestAnimationFrame(updateAndDraw);
        }
      }

      function triggerFlash(color, seconds) {
        if (flashTimer > 0.05) return;
        flashColor = color;
        flashTimer = seconds;
        flashTimerMax = seconds;
      }

      function handleInput(e) {
        if (e.type === "keydown" && e.code !== "Space") return;
        if (e.type === "keydown") e.preventDefault();

        let hitIndex = -1;
        let targetHit = null;

        for (let i = 0; i < droplets.length; i++) {
          let distance = Math.abs(droplets[i].y - targetY);
          if (distance <= targetRadius) {
            hitIndex = i;
            targetHit = droplets[i];
            break;
          }
        }

        if (targetHit !== null && hitIndex !== -1) {
          if (targetHit.type === "pure") {
            progress = Math.min(100, progress + 6);
            triggerFlash("rgba(84, 160, 255, 0.25)", 0.08);
          } else {
            progress = Math.max(0, progress - 2);
            triggerFlash("rgba(205, 132, 85, 0.4)", 0.2);
          }
          droplets.splice(hitIndex, 1);
        } else {
          progress = Math.max(0, progress - 2);
          triggerFlash("rgba(255, 255, 255, 0.15)", 0.13);
        }

        progressBar.style.width = progress + "%";

        if (progress >= 100) {
          document.getElementById("win-message").style.display = "flex";
        }
      }

      window.addEventListener("keydown", handleInput);
      canvas.addEventListener("mousedown", handleInput);

      function completePuzzle() {
        window.parent.postMessage("APPLE_COMPLETE", "*");
      }

      requestAnimationFrame(updateAndDraw);
    </script>
  </body>
</html>
